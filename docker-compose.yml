version: '3.8'

services:
  # SaaS Web Application
  gvd-saas:
    build:
      context: ./saas
      dockerfile: Dockerfile
    container_name: gvd-saas
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=production
      - PYTHONPATH=/app
    env_file:
      - ./saas/.env
    volumes:
      - ./saas/scan_reports:/app/scan_reports
      - ./saas/repos:/app/repos
      - gvd_cli:/app/cli/dist  # Mount CLI executable
    depends_on:
      - gvd-cli
    restart: unless-stopped
    networks:
      - gvd-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # CLI Scanner Service
  gvd-cli:
    build:
      context: ./cli
      dockerfile: Dockerfile
    container_name: gvd-cli
    volumes:
      - gvd_cli:/app/dist
      - gvd_reports:/app/reports
      - ./cli:/app/cli  # Mount CLI source for development
    environment:
      - PYTHONPATH=/app
    networks:
      - gvd-network
    profiles:
      - cli  # Only build when explicitly requested

  # Optional: Nginx reverse proxy for production
  nginx:
    image: nginx:alpine
    container_name: gvd-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - gvd-saas
    restart: unless-stopped
    networks:
      - gvd-network
    profiles:
      - production  # Only include in production profile

volumes:
  gvd_cli:
    driver: local
  gvd_reports:
    driver: local

networks:
  gvd-network:
    driver: bridge
